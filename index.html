<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rewriting Truths and Lies</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div id="app"></div>
    </section>
  </main>

  <script>
    const runningLocally = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost";
    const defaultCorpusEndpoint =
      runningLocally && window.location.port !== "8000"
        ? "http://127.0.0.1:8000/api/statements.php"
        : "api/statements.php";

    const defaultModelEndpoint =
      runningLocally
        ? "http://127.0.0.1:8080/predict"
        : "";

    window.APP_CONFIG = {
      // Example: "api/statements.php" or "/backend/get_statements.php"
      corpusPhpEndpoint: defaultCorpusEndpoint,
      // Example local backend endpoint for FastAPI model service
      modelApiEndpoint: defaultModelEndpoint
    };
  </script>

  <script src="src/state.js"></script>
  <script src="src/storage.js"></script>
  <script src="src/utils.js"></script>
  <script src="src/sessionTracking.js"></script>
  <script src="src/services/corpusService.js"></script>
  <script src="src/services/modelService.js"></script>

  <script src="src/pages/welcomePage.js"></script>
  <script src="src/pages/consentPage.js"></script>
  <script src="src/pages/instructionsPage.js"></script>
  <script src="src/pages/taskPage.js"></script>
  <script src="src/pages/feedbackPage.js"></script>
  <script src="src/pages/endPage.js"></script>

  <script src="src/app.js"></script>
  <script src="src/init.js"></script>
</body>
</html>
